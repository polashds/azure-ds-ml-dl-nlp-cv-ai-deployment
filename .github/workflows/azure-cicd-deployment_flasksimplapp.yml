# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - flasksimplapp

on:
  push:
    branches:
      - azure-cicd-deployment
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://flasksimplapp.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_b64672c2c7a34796bbe3dda8a52268b1 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_12e5f1c59eb2462b81114168dee3be78 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: flasksimplapp.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_b64672c2c7a34796bbe3dda8a52268b1 }}/flasktest:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'flasksimplapp'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_a0a9c99f718749df80d1ec3382f2adeb }}
        images: 'flasksimplapp.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_b64672c2c7a34796bbe3dda8a52268b1 }}/flasktest:${{ github.sha }}'